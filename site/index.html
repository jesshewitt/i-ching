<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="Description" content="Simple I Ching App">
        <meta name="theme-color" content="#bb2828"/>
        <link rel="stylesheet" href="/css/main.css">
        <link rel="icon" href="/img/favicon.png">
        <link rel="apple-touch-icon" href="/img/favicon.png">
        <link rel="manifest" href="/manifest.json">
        <script>
            // Apply saved theme before body renders to avoid a light/dark flash.
            try {
                const t = localStorage.getItem('i-ching-theme')
                if (t === 'dark' || t === 'light') document.documentElement.classList.add('theme-' + t)
            } catch (e) {}
        </script>
        <script defer type="module" src="/js/app.js"></script>
        <title>I Ching</title>
    </head>
    <body>
        <noscript>This site requires javascript.</noscript>
        <header></header>
		<main></main>
        <footer></footer>

        <script>
            navigator.serviceWorker && navigator.serviceWorker.register('/sw.js')
        </script>
    </body>
</html>
